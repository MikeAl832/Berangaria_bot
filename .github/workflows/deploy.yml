name: Deploy Bot

on:
  push:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Syntax check (py_compile)
        run: python -m py_compile $(git ls-files '*.py')

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests
        run: |
          if [ -d tests ]; then pytest -q; else echo "No tests yet — skipping"; fi

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # This VPS exposes SSH on its non-default hardening port.
          port: ${{ secrets.VPS_PORT }}
          timeout: 60s
          command_timeout: 10m
          
          script: |
            set -eu

            mkdir -p ~/.ssh
            ssh-keyscan -H github.com >> ~/.ssh/known_hosts 2>/dev/null || true
            
            mkdir -p ~/apps/Berangaria_bot
            cd ~/apps/Berangaria_bot
            
            if [ ! -d ".git" ]; then
              echo "Repository not found. Cloning..."
              # The repository is public; HTTPS avoids requiring a second
              # deploy key on the target VPS just to fetch the source.
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Repository exists. Pulling latest changes..."
              git pull --ff-only origin main
            fi

            test "$(git rev-parse HEAD)" = "${{ github.sha }}"
            
            docker compose up -d --build --remove-orphans --force-recreate

# ========================================
# 🤖 ОСНОВНАЯ МОДЕЛЬ (DeepSeek)
# ========================================
"model": "deepseek-v4-pro"
"max_context_tokens": 32000  # Максимальная история контекста
"max_reply_tokens": 4096     # Максимальный размер ответа

# Параметры генерации (можно добавить: top_k, min_p, presence_penalty, repetition_penalty, thinking)
"generation_params":
  "temperature": 0.9
  "top_p": 0.95

# Температура для фактических ответов после поиска/чтения ссылок (ниже = меньше галлюцинаций)
"factual_temperature": 0.3

# ========================================
# 👁️ VISION (Распознавание картинок/видео)
# ========================================
"vision_mode": true                      # Включить распознавание изображений и видео
"gemini_model": "gemini-3.1-flash-lite"  # Модель Gemini (бесплатные: gemini-2.0-flash, gemini-2.5-flash, gemini-3.1-flash-lite)
"video_max_duration_sec": 300            # Максимальная длительность видео (секунды). Потолок по весу — 20 МБ (лимит Telegram getFile)
"audio_max_duration_sec": 300            # Максимальная длительность голосовых/аудио (секунды)

# Настройки загрузки видео в Gemini Files API
"gemini_upload_max_wait_sec": 180        # Макс. время ожидания препроцессинга видео в Gemini (секунды). Длинным роликам нужно больше
"gemini_upload_backoff_initial": 0.5     # Начальная задержка между попытками опроса статуса (секунды)
"gemini_upload_backoff_max": 5.0         # Максимальная задержка между попытками (секунды)

# ========================================
# 🧠 ПАМЯТЬ (Mem0 + Embeddings)
# ========================================
"embedding_model": "gemini-embedding-2"  # Gemini API embedding (бесплатно, multilingual)
"embedding_dims": 768                    # Размерность векторов
"memory_search_limit": 10                # Сколько фактов подмешивать в контекст (больше=лучше контекст)
"memory_min_score": 0.2                  # Минимальная релевантность (0.2=менее строго, 0.5=очень строго)
"memory_max_chars": 1200                 # Максимальная длина блока памяти (больше=больше контекста)
"memory_flush_max_chars": 2000           # Макс. размер батча в Mem0 (символы), под лимит эмбеддера

# ========================================
# 🎨 СТИКЕРЫ (векторный поиск в Qdrant)
# ========================================
"sticker_enabled": true                  # Включить инструмент send_sticker
"sticker_collection": "stickers"         # Имя коллекции Qdrant (отдельно от mem0)
"sticker_dims": 768                       # Размерность векторов (совпадает с embedding_dims)
"sticker_min_score": 0.35                # Порог релевантности; ниже — стикер не отправляется
"sticker_top_k": 5                        # Сколько кандидатов брать из поиска (из топа берётся случайный)
"sticker_auto_sync": true                # Синхронизировать стикеры при старте бота (доливать новые из файла)
"sticker_sync_file": "stickers_clean.jsonl"  # Откуда синкать
"sticker_sync_max_per_start": 0          # 0 = залить всех недостающих; иначе не больше N за один старт (беречь квоту)
"sticker_index_version": 2               # Версия формата эмбеддинга. Бампни +1 при смене формулы текста → бот один раз сам переэмбеддит всё при старте

# ========================================
# ⚙️ ПОВЕДЕНИЕ БОТА
# ========================================
"bot_names": ["Бер", "Ber"]              # Имена на которые откликается бот
"random_reply_chance": 10                # Шанс случайного ответа в группе (%)
"summary_interval": 10                   # Сколько сообщений оставить после сжатия истории
"message_debounce_seconds": 4.0          # Таймаут для склейки последовательных сообщений (секунды)
"random_reply_cooldown": 10              # Минимальный интервал между случайными ответами (секунды)
"admin_mode": false                      # true = только админы используют опасные команды
"debug": false                           # Показывать промпты в консоли (DEBUG режим)
"verbose": false                         # Суперподробные логи: HTTP, TLS, H2 (включает debug)
"log_file": "bot.log"                    # Путь к файлу логов при локальном запуске; Docker переопределяет на /data/bot.log
"log_max_bytes": 10485760                # Размер одного файла лога до ротации (10 МБ)
"log_backup_count": 5                    # Сколько архивных файлов лога хранить

# ========================================
# 🔐 ДОСТУП (Telegram ID)
# ========================================
"allowed_users": [1217938322, 1809564460]
"allowed_groups": [-1002263830880]
"admin_alert_chat_id": [1217938322]      # ID чата для алертов о падениях (null = выкл, например свой user id)

# ========================================
# 💰 ЦЕНЫ DeepSeek (за 1M токенов)
# ========================================
"price_prompt_cache_miss": 0.435         # Обычные входные токены
"price_prompt_cache_hit": 0.003625       # Кэшированные токены (в 50 раз дешевле!)
"price_completion": 0.87                 # Выходные токены

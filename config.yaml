# ========================================
# 🤖 ОСНОВНАЯ МОДЕЛЬ (DeepSeek)
# ========================================
"model": "deepseek-v4-flash"
"max_context_tokens": 32000  # Максимальная история контекста
"max_reply_tokens": 4096     # Максимальный размер ответа

# Параметры генерации (можно добавить: top_k, min_p, presence_penalty, repetition_penalty, thinking)
"generation_params":
  "temperature": 0.9
  "top_p": 0.95

# ========================================
# 👁️ VISION (Распознавание картинок/видео)
# ========================================
"vision_mode": true                      # Включить распознавание изображений и видео
"gemini_model": "gemini-3.1-flash-lite"  # Модель Gemini (бесплатные: gemini-2.0-flash, gemini-2.5-flash, gemini-3.1-flash-lite)
"video_max_duration_sec": 60             # Максимальная длительность видео (секунды)

# Настройки загрузки видео в Gemini Files API
"gemini_upload_max_wait_sec": 60         # Максимальное время ожидания обработки видео (секунды)
"gemini_upload_backoff_initial": 0.5     # Начальная задержка между попытками опроса статуса (секунды)
"gemini_upload_backoff_max": 5.0         # Максимальная задержка между попытками (секунды)

# ========================================
# 🧠 ПАМЯТЬ (Mem0 + Embeddings)
# ========================================
"embedding_model": "gemini-embedding-2"  # Gemini API embedding (бесплатно, multilingual)
"embedding_dims": 768                    # Размерность векторов
"memory_search_limit": 10                # Сколько фактов подмешивать в контекст (больше=лучше контекст)
"memory_min_score": 0.2                  # Минимальная релевантность (0.2=менее строго, 0.5=очень строго)
"memory_max_chars": 1200                 # Максимальная длина блока памяти (больше=больше контекста)

# ========================================
# ⚙️ ПОВЕДЕНИЕ БОТА
# ========================================
"bot_names": ["Бер", "Ber"]              # Имена на которые откликается бот
"random_reply_chance": 10                # Шанс случайного ответа в группе (%)
"summary_interval": 10                   # Сколько сообщений оставить после сжатия истории
"message_debounce_seconds": 4.0          # Таймаут для склейки последовательных сообщений (секунды)
"random_reply_cooldown": 10              # Минимальный интервал между случайными ответами (секунды)
"admin_mode": false                      # true = только админы используют опасные команды
"debug": true                            # Показывать промпты в консоли (DEBUG режим)
"verbose": false                         # Суперподробные логи: HTTP, TLS, H2 (включает debug)

# ========================================
# 🔐 ДОСТУП (Telegram ID)
# ========================================
"allowed_users": [1217938322, 1809564460]
"allowed_groups": [-1002263830880]

# ========================================
# 💰 ЦЕНЫ DeepSeek (за 1M токенов)
# ========================================
"price_prompt_cache_miss": 0.14         # Обычные входные токены
"price_prompt_cache_hit": 0.0028        # Кэшированные токены (в 50 раз дешевле!)
"price_completion": 0.28                # Выходные токены

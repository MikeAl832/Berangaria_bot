server {
    listen 80;
    listen [::]:80;
    server_name logs.titlo10.fun;

    access_log /var/log/nginx/berangaria-logs.access.log;
    error_log /var/log/nginx/berangaria-logs.error.log;

    auth_basic "Berangaria logs";
    auth_basic_user_file /etc/nginx/.htpasswd-berangaria-logs;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        proxy_pass http://127.0.0.1:9999;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
        proxy_buffering off;
    }
}

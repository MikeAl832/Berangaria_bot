services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  bot:
    build: .
    env_file: .env
    environment:
      - BOT_DB_PATH=/data/bot_state.db
    depends_on:
      - qdrant
    volumes:
      - /tmp/tiktok_queue:/tmp/tiktok_queue
      - ./bot_data:/data
    restart: always

services:
  qdrant:
    image: qdrant/qdrant
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  bot:
    build: .
    env_file: .env
    environment:
      - BOT_DB_PATH=/data/bot_state.db
      - BOT_LOG_FILE=/data/bot.log
      - BOT_LOG_MAX_BYTES=10485760
      - BOT_LOG_BACKUP_COUNT=5
    depends_on:
      - qdrant
    volumes:
      - ./bot_data:/data
    restart: always
